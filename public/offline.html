<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#22B086">
    <title>Offline — Manajemen SW</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Figtree', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f8fffe 0%, #f0faf6 50%, #f5f3ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #1a1a2e;
        }

        .container {
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        .icon-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 32px;
            background: linear-gradient(135deg, #22B086 0%, #1a9070 100%);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(34, 176, 134, 0.25);
            animation: float 3s ease-in-out infinite;
        }

        .icon-wrapper svg {
            width: 56px;
            height: 56px;
            color: white;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            color: #111827;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 15px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 32px;
            font-weight: 500;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: #22B086;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(34, 176, 134, 0.3);
            transition: all 0.2s;
        }

        .retry-btn:active {
            transform: scale(0.96);
            box-shadow: 0 4px 12px rgba(34, 176, 134, 0.3);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            margin-right: 6px;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-bar {
            margin-top: 40px;
            padding: 12px 20px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            color: #991b1b;
        }

        .logo-footer {
            margin-top: 48px;
            opacity: 0.3;
        }

        .logo-footer img {
            width: 40px;
            height: 40px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 5.636a9 9 0 000 12.728M8.464 8.464a5 5 0 010 7.072M15.536 8.464a5 5 0 000 7.072M12 12h.01" />
            </svg>
        </div>

        <h1>Anda Sedang Offline</h1>
        <p>Koneksi internet tidak tersedia. Halaman yang Anda minta belum tersimpan di cache. Silakan periksa koneksi Anda dan coba lagi.</p>

        <button class="retry-btn" onclick="window.location.reload()">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Coba Lagi
        </button>

        <div class="status-bar">
            <span class="status-dot"></span>
            Tidak ada koneksi internet
        </div>

        <div class="logo-footer">
            <img src="/images/logo.png" alt="SW Logo">
        </div>
    </div>

    <script>
        // Auto-reload when back online
        window.addEventListener('online', () => window.location.reload());
    </script>
</body>
</html>
